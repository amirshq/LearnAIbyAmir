    const sidebarEl = document.getElementById("sidebar");
    const headerEl = document.getElementById("phase-header");
    const toolsEl = document.getElementById("tools-grid");
    const footerCountEl = document.getElementById("footer-count");

    let activeId = phasesData[0].id;

    function renderSidebar() {
      sidebarEl.innerHTML = "";
      phasesData.forEach((phase) => {
        const btn = document.createElement("button");
        btn.className = "sidebar-button" + (phase.id === activeId ? " active" : "");
        btn.dataset.color = phase.color;
        btn.onclick = () => {
          activeId = phase.id;
          renderSidebar();
          renderPhase();
        };

        const iconSpan = document.createElement("span");
        iconSpan.className = "icon";
        iconSpan.textContent = phase.icon;

        const labelSpan = document.createElement("span");
        labelSpan.textContent = phase.label;
        labelSpan.style.lineHeight = "1.3";

        btn.appendChild(iconSpan);
        btn.appendChild(labelSpan);
        sidebarEl.appendChild(btn);
      });
    }

    function renderPhase() {
      const phase = phasesData.find((p) => p.id === activeId);
      if (!phase) return;

      headerEl.innerHTML = "";
      toolsEl.innerHTML = "";

      // Header
      const top = document.createElement("div");
      top.className = "phase-header-top";

      const iconSpan = document.createElement("span");
      iconSpan.className = "phase-icon";
      iconSpan.textContent = phase.icon;

      const title = document.createElement("h2");
      title.className = "phase-title";
      title.style.color = phase.color;
      title.textContent = phase.label;

      top.appendChild(iconSpan);
      top.appendChild(title);

      const callout = document.createElement("div");
      callout.className = "debt-callout";
      callout.style.borderLeftColor = phase.color;
      callout.style.borderColor = phase.color + "22";

      const label = document.createElement("div");
      label.className = "debt-label";
      label.style.color = phase.color;
      label.textContent = "⚠ Hidden Debt Risk";

      const text = document.createElement("p");
      text.className = "debt-text";
      text.textContent = phase.debt;

      callout.appendChild(label);
      callout.appendChild(text);

      headerEl.appendChild(top);
      headerEl.appendChild(callout);

      // Tools
      phase.tools.forEach((tool) => {
        const card = document.createElement("div");
        card.className = "tool-card";

        const header = document.createElement("div");
        header.className = "tool-header";

        const name = document.createElement("div");
        name.className = "tool-name";
        name.textContent = tool.name;

        const pill = document.createElement("span");
        pill.className = "tool-pill";
        const color = typeColors[tool.type] || "#6B7280";
        pill.style.background = color + "22";
        pill.style.color = color;
        pill.style.borderColor = color + "44";
        pill.textContent = tool.type;

        header.appendChild(name);
        header.appendChild(pill);

        const role = document.createElement("p");
        role.className = "tool-role";
        role.textContent = tool.role;

        card.appendChild(header);
        card.appendChild(role);
        toolsEl.appendChild(card);
      });
    }

    function renderFooter() {
      const totalTools = phasesData.reduce((sum, p) => sum + p.tools.length, 0);
      footerCountEl.textContent = phasesData.length + " phases · " + totalTools + " tools mapped";
    }

    renderSidebar();
    renderPhase();
    renderFooter();
  </script>
